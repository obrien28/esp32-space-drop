[env:esp32-s3-devkitc-1]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 9600
; USE_SPI_DISPLAY selects the SPI OLED wiring + pin map for this board
; (see include/pins.h). Required for this board -- do not remove.
; USE_EEPROM enables persistent high-score storage (supported on ESP32S3;
; remove this flag on boards without EEPROM support, e.g. XIAO SAMD21)
; SERIAL_DEBUG_CONTROLS lets you play over the Serial monitor with no pot/
; button wired up: Left/Right arrow keys (or 'a'/'d' if your terminal doesn't
; forward arrow escape codes) steer the gun, 'f' fires.
; ARDUINO_USB_CDC_ON_BOOT routes Serial over this board's native USB port
; (it has no separate CP2102/CH340 UART bridge chip) -- without it, Serial
; binds to unconnected UART0 pins and nothing gets in or out over USB.
build_flags =
    -D USE_SPI_DISPLAY
    -D USE_EEPROM
    -D SERIAL_DEBUG_CONTROLS
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    adafruit/Adafruit GFX Library@^1.11.9
    adafruit/Adafruit SH110X@^2.1.11
    adafruit/Adafruit BusIO@^1.16.1
